<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Matrícula ABC - Portal</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <title>Login</title>
    <!-- Framework de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Libreria de Iconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <!-- Favicon de la aplicación de matricula -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="css/styles-login.css">
    <!-- LIBRERÍA JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <article class="login-card">
        <h1 class="titulo">Iniciar Sesión</h1>
        <form id="loginForm" class="">
            <input type="text" id="txtUsuario" placeholder="Usuario" required>
            <input type="password" id="txtPassword" placeholder="Contraseña">

            <button class="boton" type="submit">Iniciar Sesión</button>
        
        </form>
        <div id="mensaje">
            
        </div>


    </article>
    <!-- LOGIN JS -->
    <script src="js/login.js"></script>
    <!-- LIBRERÍA SWEET ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Librería JS de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
