<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula ABC - Portal</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <title>Document</title>
    <!-- Framework de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Libreria de Iconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <!-- Favicon de la aplicación de matricula -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <article class="container">
        <form id="formRegistro" class="formulario">
            <h2 class="titulo">Registro de Nuevo Alumno</h2>
            <input class="input1" type="text" id="regNombres" name="nombres" placeholder="Nombres" required>
            <input class="input1" type="text" id="regApellidos" name="apellidos" placeholder="Apellidos" required>
            <input class="input1" type="text" id="regDni" name="dni" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
            <input class="input1" type="email" id="regCorreo" name="correo" placeholder="Correo Electrónico" required>
            <input class="input1" type="date" id="regNacimiento" name="nacimiento" required>
            
            <input class="input1" type="text" id="apoNombres" name="apoNombres" placeholder="Nombres del Apoderado" required>
            <input class="input1" type="text" id="apoCelular" name="apoCelular" placeholder="Celular del Apoderado" maxlength="9" required>
            
            <button class="button1" type="submit">Registrarse</button>
            <button class="button2" id="btnLogin" type="button">
                Ya tengo cuenta / Iniciar Sesión
            </button>
            <p id="mensajeRegistro" class="mensaje"></p>
        </form>

        <form id="formLogin" class="formulario" style="display:none;">
            <h2 class="titulo">Iniciar Sesión</h2>
            <input class="input1" type="text" id="logUsuario" placeholder="N° DNI o Usuario" required>
            <input class="input1" type="password" id="logPassword" placeholder="Contraseña asignada" required>
            <button class="button1" type="submit">Ingresar</button>
            <p id="mensajeLogin" class="mensaje"></p>
        </form>
        
        
        
    </article>

    <script src="js/app.js"></script>
    <script src="js/id.js"></script>
    <!-- Librería JS de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
